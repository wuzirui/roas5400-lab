name: Issue PSNR Eval

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write

jobs:
  eval:
    if: ${{ github.actor != 'github-actions[bot]' && contains(github.event.comment.body, '/eval') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pillow numpy cryptography

      - name: Run evaluator
        id: run_eval
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          EVAL_PRIVATE_KEY_PEM: ${{ secrets.EVAL_PRIVATE_KEY_PEM }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python .tools/issue_eval.py issue-run \
            --comment-body "$COMMENT_BODY" \
            --gt-encrypted .github/eval/gt.enc.json \
            --shape-policy align_gt_to_pred \
            --result-md /tmp/eval-result.md

      - name: Print evaluator output
        if: ${{ always() }}
        run: |
          if [ -f /tmp/eval-result.md ]; then
            echo "==== evaluator output ===="
            cat /tmp/eval-result.md
          fi

      - name: Ensure fallback comment
        if: ${{ always() }}
        run: |
          if [ ! -f /tmp/eval-result.md ]; then
            cat > /tmp/eval-result.md << 'EOF'
          ### PSNR Evaluation Failed
          - Student: `(unknown)`
          - Reason: `Workflow failed before evaluator produced output.`

          Expected command:
          `/eval <student_id> [image_url ...]`
          EOF
          fi

      - name: Comment result
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          gh api "repos/$REPO/issues/$ISSUE_NUMBER/comments" \
            -f body="$(cat /tmp/eval-result.md)"
