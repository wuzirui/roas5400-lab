experiment:
  seed: 42

data:
  image_size: 224
  batch_size: 8
  num_workers: 2

model:
  patch_size: 16
  mask_ratio: 0.90
  encoder_embed_dim: 192
  encoder_depth: 3
  encoder_num_heads: 6
  decoder_embed_dim: 128
  decoder_depth: 3
  decoder_num_heads: 4
  mlp_ratio: 4.0
  decoder_type: cross

optimizer:
  name: adamw
  lr: 3.0e-4
  betas: [0.9, 0.999]
  eps: 1.0e-8
  weight_decay: 0.05

scheduler:
  name: cosine_with_warmup
  warmup_steps: 100
  total_steps: 2000

run:
  max_steps: 2000
  eval_every: 100
  save_every: 200
  grad_accum_steps: 1
